version: "2"
output:
  sort-order:
    - linter
    - file
linters:
  default: none
  enable:
    - bodyclose
    - cyclop
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - funlen
    - gocognit
    - gocritic
    - godot
    - gosec
    - govet
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - noctx
    - nosprintfhostport
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unused
    - whitespace
  settings:
    cyclop:
      max-complexity: 15
      package-average: 0
    errcheck:
      check-type-assertions: true
      check-blank: true
    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true
    exhaustive:
      check:
        - switch
      default-signifies-exhaustive: true
    funlen:
      lines: 80
      statements: 50
      ignore-comments: true
    gocognit:
      min-complexity: 20
    gocritic:
      disabled-checks:
        - whyNoLint
      enabled-tags:
        - diagnostic
        - style
        - performance
    godot:
      scope: declarations
      capital: false
    gosec:
      excludes:
        - G104
      config:
        G306: "0640"
    govet:
      disable:
        - fieldalignment
      enable-all: true
    misspell:
      locale: US
    revive:
      severity: warning
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: var-naming
        - name: package-comments
        - name: indent-error-flow
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: dot-imports
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: time-naming
        - name: unexported-return
        - name: modifies-parameter
        - name: superfluous-else
        - name: unreachable-code
        - name: waitgroup-by-value
        - name: atomic
        - name: range-val-address
        - name: if-return
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - cyclop
          - errcheck
          - funlen
          - gocognit
          - gosec
        path: _test\.go
      - linters:
          - godot
        path: cmd/
      - linters:
          - all
        path: \.pb\.go$
      - linters:
          - all
        path: mock_.*\.go$
      - linters:
          - cyclop
        path: (.+)_test\.go
    paths:
      - vendor
      - bin
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  fix: false
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
